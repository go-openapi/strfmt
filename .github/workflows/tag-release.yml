name: Release on tag

permissions:
  contents: read

on:
  push:
    tags:
      - v[0-9]+*

jobs:
  gh-release:
    name: Create release
    permissions:
      contents: write
    uses: go-openapi/ci-workflows/.github/workflows/release.yml@f3de433eeb102475ff4f5c5b2f19e25af8731ad0 # v0.3.2
    with:
      tag: ${{ github.ref_name }}
      is-monorepo: true
    secrets: inherit
