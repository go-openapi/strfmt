name: Release on tag

permissions:
  contents: read

on:
  push:
    tags:
      - v[0-9]+*

jobs:
  gh-release:
    name: Create release
    permissions:
      contents: write
    uses: go-openapi/ci-workflows/.github/workflows/release.yml@19b4bfa40f3712057a6ffc78763b2feb75ee94d9 # v0.3.1
    with:
      tag: ${{ github.ref_name }}
      is-monorepo: true
    secrets: inherit
