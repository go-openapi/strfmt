name: Monitor bot PRs

on:
  workflow_dispatch:
  schedule:
    - cron: '18 6 * * *'

permissions:
  contents: read

jobs:
  monitor-pr:
    permissions:
      contents: write
      pull-requests: write
    uses: go-openapi/ci-workflows/.github/workflows/monitor-bot-pr.yml@19b4bfa40f3712057a6ffc78763b2feb75ee94d9 # v0.3.1
    secrets: inherit
